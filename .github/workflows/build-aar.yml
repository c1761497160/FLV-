name: Build AAR

on:
  push:
    branches: [ main, master ]
    paths:
      - 'nativeplugins/WoxuFlvAudio/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build AAR
        run: |
          cd nativeplugins/WoxuFlvAudio
          chmod +x gradlew 2>/dev/null || true
          ./gradlew :lib:assembleRelease || gradle :lib:assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: WoxuFlvAudio-Release
          path: nativeplugins/WoxuFlvAudio/lib/build/outputs/aar/*.aar
