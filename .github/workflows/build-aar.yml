name: Build AAR
on:
  push:
    branches: [ main, master ]
    paths:
      - 'nativeplugins/WoxuFlvAudio/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build AAR
        run: |
          cd nativeplugins/WoxuFlvAudio
          gradle wrapper --gradle-version=7.5
          ANDROID_HOME=/usr/local/lib/android/sdk ./gradlew :lib:assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: WoxuFlvAudio-Release
          path: nativeplugins/WoxuFlvAudio/lib/build/outputs/aar/*.aar
