name: Build AAR
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build AAR
        run: |
          ls -la
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          export PATH=/tmp/gradle-8.4/bin:$PATH
          gradle :lib:assembleRelease --no-daemon -p .

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: WoxuFlvAudio-Release
          path: nativeplugins/WoxuFlvAudio/lib/build/outputs/aar/*.aar
