name: Build AAR

on:
  push:
    branches: [ main, master ]
    paths:
      - 'nativeplugins/WoxuFlvAudio/**'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build AAR
        run: |
          cd nativeplugins/WoxuFlvAudio
          chmod +x gradlew 2>/dev/null || true
          # 下载 Gradle Wrapper（因为可能没有本地 wrapper jar）
          ./gradlew :lib:assembleRelease || {
            # 如果 Gradle wrapper 不可用，用系统 Gradle
            gradle :lib:assembleRelease
          }

      - name: Upload AAR
        uses: actions/upload-artifact@v3
        with:
          name: WoxuFlvAudio-Release
          path: nativeplugins/WoxuFlvAudio/lib/build/outputs/aar/*.aar
